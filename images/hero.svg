<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 812" width="1440" height="812" role="img" aria-label="Martin's Moving box truck traveling a cross-country route">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c7a40"/>
      <stop offset="0.55" stop-color="#016a31"/>
      <stop offset="1" stop-color="#00481f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.18" r="0.6">
      <stop offset="0" stop-color="#37c074" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#37c074" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7a43"/>
      <stop offset="1" stop-color="#ed5a23"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9eef0"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfeaf7"/>
      <stop offset="1" stop-color="#9cc7dc"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1440" height="812" fill="url(#sky)"/>
  <rect width="1440" height="812" fill="url(#glow)"/>

  <!-- faint city-network / map dots (upper right) -->
  <g fill="#ffffff" opacity="0.10">
    <circle cx="1000" cy="150" r="4"/><circle cx="1075" cy="120" r="3"/><circle cx="1150" cy="170" r="5"/>
    <circle cx="1225" cy="130" r="3"/><circle cx="1300" cy="190" r="4"/><circle cx="1370" cy="150" r="3"/>
    <circle cx="1040" cy="225" r="3"/><circle cx="1130" cy="250" r="4"/><circle cx="1230" cy="235" r="3"/>
    <circle cx="1320" cy="270" r="4"/><circle cx="1090" cy="320" r="3"/><circle cx="1200" cy="330" r="3"/>
    <circle cx="1300" cy="350" r="4"/><circle cx="1380" cy="300" r="3"/>
  </g>
  <g stroke="#ffffff" stroke-width="1.5" opacity="0.07" fill="none">
    <path d="M1000 150 L1150 170 L1300 190"/>
    <path d="M1075 120 L1130 250 L1230 235"/>
    <path d="M1150 170 L1200 330 L1300 350"/>
    <path d="M1225 130 L1320 270 L1380 300"/>
  </g>

  <!-- dashed cross-country route -->
  <path d="M150 300 C 430 200, 720 460, 1010 300 S 1280 150, 1330 175"
        fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 16"/>

  <!-- origin pin (start of route) -->
  <g transform="translate(150 300)">
    <path d="M0 0 C -16 -22, -16 -42, 0 -42 C 16 -42, 16 -22, 0 0 Z" fill="#ffffff" opacity="0.85"/>
    <circle cx="0" cy="-29" r="6" fill="#016a31"/>
  </g>
  <!-- destination pin (Florida end, gold) -->
  <g transform="translate(1330 175)">
    <path d="M0 0 C -19 -26, -19 -50, 0 -50 C 19 -50, 19 -26, 0 0 Z" fill="#f6c244"/>
    <circle cx="0" cy="-34" r="7.5" fill="#7a4a00"/>
  </g>

  <!-- floating moving boxes -->
  <g opacity="0.92">
    <g transform="translate(430 250) rotate(-9)">
      <rect x="-26" y="-26" width="52" height="52" rx="5" fill="#cf9c5d"/>
      <rect x="-26" y="-4" width="52" height="8" fill="#b9863f"/>
      <rect x="-4" y="-26" width="8" height="52" fill="#b9863f"/>
    </g>
    <g transform="translate(360 330) rotate(7)">
      <rect x="-20" y="-20" width="40" height="40" rx="4" fill="#d8aa6c"/>
      <rect x="-20" y="-3" width="40" height="6" fill="#c0913f"/>
    </g>
  </g>

  <!-- TRUCK (driving right) -->
  <g transform="translate(540 360)">
    <!-- ground shadow -->
    <ellipse cx="200" cy="232" rx="220" ry="22" fill="#00300f" opacity="0.35"/>

    <!-- motion lines behind -->
    <g stroke="#ffffff" stroke-linecap="round" opacity="0.5">
      <line x1="-70" y1="60" x2="-18" y2="60" stroke-width="6"/>
      <line x1="-92" y1="110" x2="-28" y2="110" stroke-width="6"/>
      <line x1="-58" y1="160" x2="-14" y2="160" stroke-width="6"/>
    </g>

    <!-- cargo box -->
    <rect x="0" y="20" width="270" height="190" rx="14" fill="url(#box)" stroke="#cdd6da" stroke-width="2"/>
    <rect x="0" y="118" width="270" height="16" fill="#016a31"/>
    <line x1="135" y1="20" x2="135" y2="210" stroke="#dbe2e5" stroke-width="3"/>
    <rect x="116" y="150" width="6" height="30" rx="3" fill="#b9c4c9"/>

    <!-- cab -->
    <path d="M270 70 h64 a26 26 0 0 1 22 12 l40 60 a20 20 0 0 1 4 12 v44 a20 20 0 0 1 -20 20 h-110 Z" fill="url(#cab)"/>
    <!-- windshield + window -->
    <path d="M300 86 h40 a14 14 0 0 1 12 7 l24 36 h-76 Z" fill="url(#glass)"/>
    <!-- door seam -->
    <line x1="300" y1="86" x2="300" y2="210" stroke="#d24f1c" stroke-width="3" opacity="0.8"/>
    <!-- bumper + headlight -->
    <rect x="392" y="190" width="20" height="30" rx="5" fill="#374151"/>
    <circle cx="398" cy="170" r="7" fill="#ffe08a"/>

    <!-- wheels -->
    <g>
      <circle cx="78" cy="214" r="36" fill="#1f2937"/>
      <circle cx="78" cy="214" r="15" fill="#9ca3af"/>
      <circle cx="78" cy="214" r="6" fill="#4b5563"/>
      <circle cx="330" cy="214" r="36" fill="#1f2937"/>
      <circle cx="330" cy="214" r="15" fill="#9ca3af"/>
      <circle cx="330" cy="214" r="6" fill="#4b5563"/>
    </g>
  </g>
</svg>
